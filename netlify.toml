# netlify.toml
# Tells Netlify where your functions live and sets up redirects.

[build]
  publish = "."          # serve all HTML files from the root folder
  functions = "netlify/functions"

# Optional: redirect /api/qb-token to the function for a cleaner URL
[[redirects]]
  from = "/api/qb-token"
  to   = "/.netlify/functions/qb-token"
  status = 200
